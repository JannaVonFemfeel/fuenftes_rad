    const cols = []; let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      if (line[i] === '"') { inQ = !inQ; }

  }).filter(r => r[0]);

function useCountdown(iso) {
  const [now, setNow] = useState(() => new Date());
  useEffect(() => { const id = setInterval(() => setNow(new Date()), 1000); return () => clearInterval(id); }, []);
  const diff = new Date(iso) - now, past = diff < 0, abs = Math.abs(diff);
  return { days: Math.floor(abs/86400000), hours: Math.floor((abs%86400000)/3600000), mins: Math.floor((abs%3600000)/60000), secs: Math.floor((abs%60000)/1000), past };
}

function useDailyBark(key, autoFire = true) {
  const [bark, setBark] = useState(false);
  useEffect(() => {
    if (!autoFire) return;
    const lk = `${key}-day`;
    if (localStorage.getItem(lk) !== today()) { const t = setTimeout(() => setBark(true), 650); localStorage.setItem(lk, today()); return () => clearTimeout(t); }
  }, [key, autoFire]);
  useEffect(() => { if (!bark) return; const id = setTimeout(() => setBark(false), 3600); return () => clearTimeout(id); }, [bark]);
  return [bark, () => setBark(true)];
}

function playSound(type) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    
    if (type === 'dog') {
      // Woof woof — two quick barks
      [0, 0.25].forEach(offset => {
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type = 'sawtooth';
        o.frequency.setValueAtTime(180, ctx.currentTime + offset);
        o.frequency.exponentialRampToValueAtTime(80, ctx.currentTime + offset + 0.12);
        g.gain.setValueAtTime(0.4, ctx.currentTime + offset);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + offset + 0.15);
        o.start(ctx.currentTime + offset);
        o.stop(ctx.currentTime + offset + 0.15);
      });
    }

    if (type === 'frog') {
      // Wasser-Blop — drei nasse Plops
      [0, 0.22, 0.44].forEach((offset, i) => {
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        const filter = ctx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = 600;
        o.connect(filter); filter.connect(g); g.connect(ctx.destination);
        o.type = 'sine';
        const baseFreq = 280 - i * 40;
        o.frequency.setValueAtTime(baseFreq * 1.8, ctx.currentTime + offset);
        o.frequency.exponentialRampToValueAtTime(baseFreq * 0.4, ctx.currentTime + offset + 0.18);
        g.gain.setValueAtTime(0.0, ctx.currentTime + offset);
        g.gain.linearRampToValueAtTime(0.5, ctx.currentTime + offset + 0.01);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + offset + 0.2);
        o.start(ctx.currentTime + offset);
        o.stop(ctx.currentTime + offset + 0.22);
        // Extra noise burst for the "wet" feel
        const noise = ctx.createOscillator();
        const ng = ctx.createGain();
        noise.connect(ng); ng.connect(ctx.destination);
        noise.type = 'triangle';
        noise.frequency.setValueAtTime(baseFreq * 2.2, ctx.currentTime + offset);
        noise.frequency.exponentialRampToValueAtTime(baseFreq * 0.3, ctx.currentTime + offset + 0.08);
        ng.gain.setValueAtTime(0.15, ctx.currentTime + offset);
        ng.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + offset + 0.09);
        noise.start(ctx.currentTime + offset);
        noise.stop(ctx.currentTime + offset + 0.1);
      });
    }

    if (type === 'sheep') {
      // Möt möt — wobbly meh
      [0, 0.4].forEach(offset => {
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type = 'triangle';
        o.frequency.setValueAtTime(260, ctx.currentTime + offset);
        o.frequency.setValueAtTime(220, ctx.currentTime + offset + 0.05);
        o.frequency.setValueAtTime(240, ctx.currentTime + offset + 0.1);
        o.frequency.exponentialRampToValueAtTime(160, ctx.currentTime + offset + 0.3);
        g.gain.setValueAtTime(0.35, ctx.currentTime + offset);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + offset + 0.32);
        o.start(ctx.currentTime + offset);
        o.stop(ctx.currentTime + offset + 0.32);
      });
    }

    setTimeout(() => ctx.close(), 2000);
  } catch(e) {}
}

function Confetti({ active, onDone }) {
  const canvasRef = React.useRef(null);
  useEffect(() => {
    if (!active) return;
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const COLORS = [YELLOW, ORANGE, CREAM, '#27AE60', '#fff', '#FF6B35', '#F5D547'];
    const particles = Array.from({length: 120}, () => ({
      x: canvas.width / 2 + (Math.random()-0.5)*80,
      y: canvas.height * 0.6,
      vx: (Math.random()-0.5)*14,
      vy: -(Math.random()*18+8),
      size: Math.random()*10+4,
      color: COLORS[Math.floor(Math.random()*COLORS.length)],
      shape: Math.random() > 0.4 ? 'rect' : 'circle',
      rot: Math.random()*Math.PI*2,
      rotV: (Math.random()-0.5)*0.3,
      gravity: 0.4+Math.random()*0.2,
      alpha: 1,
      // some are champagne drops (elongated)
      isChamp: Math.random() > 0.7,
    }));

    let frame;
    let tick = 0;
    const animate = () => {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      let alive = false;
      particles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += p.gravity;
        p.vx *= 0.99;
        p.rot += p.rotV;
        if (tick > 40) p.alpha -= 0.018;
        if (p.alpha <= 0) return;
        alive = true;
        ctx.save();
        ctx.globalAlpha = Math.max(0, p.alpha);
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.fillStyle = p.color;
        if (p.isChamp) {
          // champagne drop
          ctx.beginPath();
          ctx.ellipse(0, 0, p.size*0.4, p.size*1.2, 0, 0, Math.PI*2);
          ctx.fill();
        } else if (p.shape === 'circle') {
          ctx.beginPath();
          ctx.arc(0, 0, p.size/2, 0, Math.PI*2);
          ctx.fill();
        } else {
          ctx.fillRect(-p.size/2, -p.size/4, p.size, p.size/2);
        }
        ctx.restore();
      });
      tick++;
      if (alive && tick < 160) {
        frame = requestAnimationFrame(animate);
      } else {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        onDone();
      }
    };
    frame = requestAnimationFrame(animate);

    // Champagne pop sound
    try {
      const actx = new (window.AudioContext || window.webkitAudioContext)();
      // Pop
      const o1 = actx.createOscillator(), g1 = actx.createGain();
      o1.connect(g1); g1.connect(actx.destination);
      o1.type = 'triangle';
      o1.frequency.setValueAtTime(800, actx.currentTime);
      o1.frequency.exponentialRampToValueAtTime(200, actx.currentTime + 0.08);
      g1.gain.setValueAtTime(0.6, actx.currentTime);
      g1.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.1);
      o1.start(); o1.stop(actx.currentTime + 0.1);
      // Fizz
      const bufSize = actx.sampleRate * 0.8;
      const buf = actx.createBuffer(1, bufSize, actx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < bufSize; i++) data[i] = (Math.random()*2-1) * Math.exp(-i/bufSize*6);
      const src = actx.createBufferSource(), gn = actx.createGain();
      const filt = actx.createBiquadFilter(); filt.type='bandpass'; filt.frequency.value=2000; filt.Q.value=0.5;
      src.buffer=buf; src.connect(filt); filt.connect(gn); gn.connect(actx.destination);
      gn.gain.setValueAtTime(0.15, actx.currentTime+0.08);
      gn.gain.exponentialRampToValueAtTime(0.001, actx.currentTime+0.9);
      src.start(actx.currentTime+0.08);
      setTimeout(()=>actx.close(),2000);
    } catch(e){}

    return () => cancelAnimationFrame(frame);
  }, [active]);

  if (!active) return null;
  return <canvas ref={canvasRef} style={{position:'fixed',inset:0,zIndex:300,pointerEvents:'none'}}/>;
}

      <button onClick={submit} style={{marginTop:16,padding:'13px 16px 12px',width:'100%',background:YELLOW,color:INK,border:'none',fontFamily:'Bungee,sans-serif',fontSize:16,textTransform:'uppercase',cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center',transform:wonk(1.2),boxShadow:`5px 5px 0 0 ${ORANGE}`}}>

      <div style={{marginTop:8,display:'flex',flexDirection:'column',gap:6}}>
        {PLAYERS.map(p=>{

function InstallBanner() {
  const [show,setShow] = useState(false);
  const [deferredPrompt,setDP] = useState(null);
  useEffect(()=>{
    const h=e=>{e.preventDefault();setDP(e);if(!localStorage.getItem('pwa-dismissed'))setShow(true);};
    window.addEventListener('beforeinstallprompt',h);
    return ()=>window.removeEventListener('beforeinstallprompt',h);
  },[]);
  const install=async()=>{if(!deferredPrompt)return;deferredPrompt.prompt();const r=await deferredPrompt.userChoice;if(r.outcome==='accepted')setShow(false);};
  const dismiss=()=>{setShow(false);localStorage.setItem('pwa-dismissed','1');};
  if(!show)return null;
  return <div className="install-banner">
    <div className="install-banner-text">Zum Homescreen hinzufügen für schnellen Zugriff</div>
    <button className="install-banner-btn" onClick={install}>Installieren</button>
    <button className="install-banner-close" onClick={dismiss}>✕</button>
  </div>;
}

function App() {

    </div>

    <InstallBanner/>
    <PlaneAnimation active={planeActive} onDone={()=>setPlaneActive(false)}/>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<!-- Service Worker for offline + PWA -->
<script>
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'fuenftes-rad-v1';
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(['./', './index.html'])));
    });
    self.addEventListener('fetch', e => {
      e.respondWith(
        fetch(e.request).catch(() => caches.match(e.request))
      );
    });
  `;
  const swBlob = new Blob([swCode], {type: 'application/javascript'});
  const swUrl = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl).catch(()=>{});
}
</script>
