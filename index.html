  return text.trim().split('\n').slice(1).map(line => {
    const cols = []; let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      if (line[i] === '"') { inQ = !inQ; }
      else if (line[i] === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }

    }
    cols.push(cur.trim());
    return cols;
  }).filter(r => r[0]);
};

function useCountdown(iso) {
  const [now, setNow] = useState(() => new Date());
  useEffect(() => { const id = setInterval(() => setNow(new Date()), 1000); return () => clearInterval(id); }, []);
  const diff = new Date(iso) - now, past = diff < 0, abs = Math.abs(diff);
  return { days: Math.floor(abs/86400000), hours: Math.floor((abs%86400000)/3600000), mins: Math.floor((abs%3600000)/60000), secs: Math.floor((abs%60000)/1000), past };
}

function useDailyBark(key, autoFire = true) {
  const [bark, setBark] = useState(false);
  useEffect(() => {
    if (!autoFire) return;
    const lk = `${key}-day`;
    if (localStorage.getItem(lk) !== today()) { const t = setTimeout(() => setBark(true), 650); localStorage.setItem(lk, today()); return () => clearTimeout(t); }
  }, [key, autoFire]);
  useEffect(() => { if (!bark) return; const id = setTimeout(() => setBark(false), 3600); return () => clearTimeout(id); }, [bark]);
  return [bark, () => setBark(true)];
}

        if(data.scores){ setPoints(p=>({...p,...data.scores})); localStorage.setItem(POINTS_KEY,JSON.stringify({...readPoints(),...data.scores})); }
        if(data.todayVotes){ const m={...readVotes(),...data.todayVotes}; setTodayVotes(m); localStorage.setItem(VOTES_KEY,JSON.stringify(m)); }
      }).catch(()=>{});
  }, []);

  const ranked = [...PLAYERS].map(n=>({name:n,pts:points[n]||0})).sort((a,b)=>b.pts-a.pts);
  const medal = i => ["🥇","🥈","🥉"][i];
  const todayTally = PLAYERS.reduce((acc,p)=>{acc[p]=Object.values(todayVotes).filter(v=>v===p).length;return acc;},{});

  const submit = async () => {
    if(!voter||!winner){setConfirm("Wähle dich UND den Tagessieger.");setTimeout(()=>setConfirm(""),2200);return;}
    if(todayVotes[voter]){setConfirm(`${voter} hat heute schon abgestimmt ✓`);setTimeout(()=>setConfirm(""),2500);return;}
    const nv={...todayVotes,[voter]:winner}, np={...points,[winner]:(points[winner]||0)+1};
    localStorage.setItem(VOTES_KEY,JSON.stringify(nv)); localStorage.setItem(POINTS_KEY,JSON.stringify(np));
    setTodayVotes(nv); setPoints(np);
    setConfirm(`✓ ${voter} → ${winner}`); setVoter(null); setWinner(null);
    setTimeout(()=>setConfirm(""),2400);
    setSyncing(true);
    try{ await fetch(`${APPS_SCRIPT_URL}?action=vote&date=${today()}&winner=${encodeURIComponent(winner)}&voter=${encodeURIComponent(voter)}`); }catch(e){}
    setSyncing(false);
  };

  const pill = (active,disabled) => ({ flex:1, padding:'9px 6px 8px', background:active?CREAM:'transparent', color:active?INK:CREAM, border:`1.8px solid ${CREAM}`, fontFamily:'JetBrains Mono,monospace', fontSize:11, letterSpacing:'0.1em', textTransform:'uppercase', fontWeight:700, cursor:disabled?'not-allowed':'pointer', opacity:disabled?0.45:1 });

  return <div style={{padding:'28px 18px 0'}}>
    <div style={{fontFamily:'"Caveat",cursive',fontSize:26,color:YELLOW,transform:wonk(-2),lineHeight:1}}>Wer gewinnt den großen Preis?</div>
    <div style={{marginLeft:4,marginTop:-2}}><Scribble width={150} color={ORANGE} thick={4}/></div>
    <div style={{fontFamily:'Bungee,sans-serif',fontSize:30,lineHeight:1,color:CREAM,textTransform:'uppercase',marginTop:6}}>Leaderboard</div>

    <div style={{marginTop:14,display:'flex',flexDirection:'column',gap:2}}>
      {ranked.map((p,i)=>(
        <div key={p.name} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0 9px',borderBottom:i<ranked.length-1?`1.5px dashed ${CREAM}`:'none'}}>
          <span style={{fontSize:26,lineHeight:1,width:30,textAlign:'center'}}>{medal(i)}</span>
          <span style={{flex:1,fontFamily:'Bungee,sans-serif',fontSize:22,color:CREAM,textTransform:'uppercase',lineHeight:1}}>{p.name}</span>
          <span style={{fontFamily:'Bungee,sans-serif',fontSize:26,color:ORANGE,fontVariantNumeric:'tabular-nums'}}>{String(p.pts).padStart(2,'0')}</span>
          <span style={{fontFamily:'JetBrains Mono,monospace',fontSize:9,color:CREAM,opacity:0.7,letterSpacing:'0.18em',textTransform:'uppercase',width:24}}>pts</span>
        </div>
      ))}
    </div>

    <div style={{marginTop:22}}>
      <div style={{fontFamily:'"Caveat",cursive',fontSize:22,color:YELLOW,transform:wonk(1),lineHeight:1}}>Stimm ab</div>
      <div style={{fontFamily:'Bungee,sans-serif',fontSize:22,lineHeight:1,color:CREAM,textTransform:'uppercase',marginTop:4}}>Wer hat heute gewonnen?</div>
      {challenge && <div style={{fontFamily:'JetBrains Mono,monospace',fontSize:10,color:CREAM,opacity:0.5,marginTop:4,letterSpacing:'0.1em',textTransform:'uppercase'}}>↳ {challenge.title}</div>}

      <div style={{marginTop:14,fontFamily:'JetBrains Mono,monospace',fontSize:10,letterSpacing:'0.2em',textTransform:'uppercase',color:CREAM,opacity:0.85}}>01 · Ich bin</div>
      <div style={{display:'flex',gap:6,marginTop:6}}>
        {VOTERS.map(v=><button key={v} onClick={()=>!todayVotes[v]&&setVoter(v)} disabled={!!todayVotes[v]} style={pill(voter===v,!!todayVotes[v])}>{v}{todayVotes[v]?' ✓':''}</button>)}
      </div>

      <div style={{marginTop:14,fontFamily:'JetBrains Mono,monospace',fontSize:10,letterSpacing:'0.2em',textTransform:'uppercase',color:CREAM,opacity:0.85}}>02 · Tagessieger</div>
      <div style={{display:'flex',gap:6,marginTop:6}}>
        {PLAYERS.map(p=><button key={p} onClick={()=>setWinner(p)} style={pill(winner===p,false)}>{p}</button>)}
      </div>

      <button onClick={submit} style={{marginTop:16,padding:'13px 16px 12px',width:'100%',background:YELLOW,color:INK,border:'none',fontFamily:'Bungee,sans-serif',fontSize:16,textTransform:'uppercase',cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center',transform:wonk(1.2),boxShadow:`5px 5px 0 0 ${ORANGE}`}}>
        <span>Stimme abgeben {syncing?'…':''}</span>
        <span style={{fontFamily:'JetBrains Mono',fontSize:16}}>↑</span>
      </button>

      {confirm && <div style={{marginTop:10,fontFamily:'"Caveat",cursive',fontSize:18,color:ORANGE,transform:wonk(-1)}}>{confirm}</div>}

      <div style={{marginTop:18,fontFamily:'JetBrains Mono,monospace',fontSize:10,letterSpacing:'0.2em',textTransform:'uppercase',color:CREAM,opacity:0.85,display:'flex',justifyContent:'space-between'}}>
        <span>// Stimmen heute</span><span>{Object.keys(todayVotes).length}/3</span>
      </div>
      <div style={{marginTop:8,display:'flex',flexDirection:'column',gap:6}}>
        {PLAYERS.map(p=>{
          const n=todayTally[p], pct=(n/Math.max(1,Object.keys(todayVotes).length))*100;
          return <div key={p} style={{display:'flex',alignItems:'center',gap:10}}>
            <span style={{width:70,fontFamily:'JetBrains Mono,monospace',fontSize:11,letterSpacing:'0.1em',textTransform:'uppercase',color:CREAM}}>{p}</span>
            <div style={{flex:1,height:14,background:'rgba(245,233,212,0.18)',position:'relative',overflow:'hidden'}}>
              <div style={{position:'absolute',inset:0,width:`${pct}%`,background:n>0?ORANGE:'transparent',transition:'width 240ms ease'}}/>
            </div>
            <span style={{width:18,textAlign:'right',fontFamily:'Bungee,sans-serif',fontSize:14,color:n>0?YELLOW:CREAM,fontVariantNumeric:'tabular-nums'}}>{n}</span>
          </div>;
        })}
      </div>
    </div>
  </div>;
}

function InstallBanner() {
  const [show,setShow] = useState(false);
  const [deferredPrompt,setDP] = useState(null);
  useEffect(()=>{
    const h=e=>{e.preventDefault();setDP(e);if(!localStorage.getItem('pwa-dismissed'))setShow(true);};
    window.addEventListener('beforeinstallprompt',h);
    return ()=>window.removeEventListener('beforeinstallprompt',h);
  },[]);
  const install=async()=>{if(!deferredPrompt)return;deferredPrompt.prompt();const r=await deferredPrompt.userChoice;if(r.outcome==='accepted')setShow(false);};
  const dismiss=()=>{setShow(false);localStorage.setItem('pwa-dismissed','1');};
  if(!show)return null;
  return <div className="install-banner">
    <div className="install-banner-text">Zum Homescreen hinzufügen für schnellen Zugriff</div>
    <button className="install-banner-btn" onClick={install}>Installieren</button>
    <button className="install-banner-close" onClick={dismiss}>✕</button>
  </div>;
}

<!-- Service Worker for offline + PWA -->
<script>
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'fuenftes-rad-v1';
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(['./', './index.html'])));
    });
    self.addEventListener('fetch', e => {
      e.respondWith(
        fetch(e.request).catch(() => caches.match(e.request))
      );
    });
  `;
  const swBlob = new Blob([swCode], {type: 'application/javascript'});
  const swUrl = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl).catch(()=>{});
}
</script>
